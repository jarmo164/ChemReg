name: Build and Deploy

on:
  push:
    branches: [ test ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_IP: ${{ secrets.SERVER_IP }}
      DEPLOY_PATH: ~/chemreg
      ENV_FILE: ${{ secrets.ENV_FILE }}
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
      DOCKER_COMPOSE_FILE: docker-compose.yaml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make gradlew executable
        working-directory: backend
        run: chmod +x gradlew

      - name: Test and build backend
        working-directory: backend
        run: ./gradlew --no-daemon clean build

      - name: Verify backend jar exists
        run: |
          echo "Backend build/libs:"
          ls -lh backend/build/libs
          test -n "$(find backend/build/libs -name '*.jar' -type f)"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          CI: true
        run: npm test -- --watchAll=false

      - name: Build frontend
        working-directory: frontend
        env:
          CI: true
          REACT_APP_API_URL: https://chemreg.zapto.org
        run: npm run build

      - name: Set up SSH key
        run: |
          set -e
          mkdir -p ~/.ssh

          if [ -z "$SERVER_IP" ]; then
            echo "SERVER_IP is empty"
            exit 1
          fi

          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "SSH_PRIVATE_KEY is empty"
            exit 1
          fi

          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Checking SSH port on $SERVER_IP"
          timeout 10 bash -c "</dev/tcp/$SERVER_IP/22" && echo "Port 22 reachable" || (echo "Port 22 not reachable"; exit 1)

          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts

      - name: Create .env from secret
        run: |
          printf '%s\n' "$ENV_FILE" > .env
          echo "REACT_APP_API_URL=$REACT_APP_API_URL" >> .env

      - name: Create deployment package
        run: |
          tar czf deployment.tar.gz \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='backend/.gradle' \
            --exclude='.git' \
            --exclude='.github' \
            backend \
            frontend \
            docker-compose.yaml \
            .env

      - name: Show package size
        run: |
          ls -lh deployment.tar.gz
          du -h deployment.tar.gz

      - name: Test SSH connection
        run: |
          time ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "$SSH_USER@$SERVER_IP" "echo SSH OK"

      - name: Copy deployment package to server
        run: |
          set -e

          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "$SSH_USER@$SERVER_IP" "mkdir -p $DEPLOY_PATH"

          echo "Uploading deployment package..."
          time scp \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            deployment.tar.gz \
            "$SSH_USER@$SERVER_IP:$DEPLOY_PATH/"

          echo "Remote package size:"
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SERVER_IP" "ls -lh $DEPLOY_PATH/deployment.tar.gz"

      - name: Deploy on server
        run: |
          ssh -tt -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SERVER_IP" "
              set -e
              mkdir -p $DEPLOY_PATH
              cd $DEPLOY_PATH

              if command -v docker-compose >/dev/null 2>&1; then
                DC='docker-compose'
              else
                DC='docker compose'
              fi

              echo 'Current directory:'
              pwd
              ls -lh || true

              echo 'Stopping containers...'
              \$DC -f '$DOCKER_COMPOSE_FILE' down || true

              echo 'Cleaning old app files...'
              rm -rf backend frontend

              echo 'Cleaning Docker cache...'
              docker builder prune -af || true
              docker system prune -af || true

              echo 'Extracting archive...'
              tar xzf deployment.tar.gz
              rm -f deployment.tar.gz

              echo 'After extract:'
              ls -lh

              echo 'Checking backend jar on server...'
              ls -lh backend/build/libs
              test -n \"\$(find backend/build/libs -name '*.jar' -type f)\"

              if [ ! -f '$DOCKER_COMPOSE_FILE' ]; then
                echo 'ERROR: $DOCKER_COMPOSE_FILE not found!'
                exit 1
              fi

              echo 'Building containers...'
              \$DC -f '$DOCKER_COMPOSE_FILE' build --no-cache frontend
              \$DC -f '$DOCKER_COMPOSE_FILE' build --no-cache backend

              echo 'Starting containers...'
              \$DC -f '$DOCKER_COMPOSE_FILE' up -d --force-recreate

              echo 'Deployment complete!'
              \$DC -f '$DOCKER_COMPOSE_FILE' ps
            "
