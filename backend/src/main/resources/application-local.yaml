spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/chemreg
    username: chemreg_user
    password: chemreg_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    org.springframework.security: DEBUG
    org.flywaydb: INFO
    root: INFO
    com.chemreg.chemreg: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    issuer: ChemReg
    secret: 5Zppg2eIxbwTlRBPF8p2RnYVSPjn2r3D1XUD06sgKQM=
    access-token-minutes: 15
    refresh-token-days: 30