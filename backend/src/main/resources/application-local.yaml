spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/chemreg
    username: chemreg_user
    password: chemreg_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    org.springframework.security: DEBUG
    org.flywaydb: INFO
    root: INFO
    com.chemreg.chemreg: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    issuer: ${APP_JWT_ISSUER:ChemReg}
    secret: ${APP_JWT_SECRET}
    access-token-minutes: ${APP_JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${APP_JWT_REFRESH_TOKEN_DAYS:30}